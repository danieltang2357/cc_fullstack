<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>
                <svg class="logo-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                图片压缩工具
            </h1>
            <p class="subtitle">快速、高效、安全的在线图片压缩服务</p>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 上传区域 -->
            <section class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <h2>拖放图片到这里</h2>
                    <p>或点击选择文件</p>
                    <p class="file-hint">支持 JPG、PNG、WebP、GIF 格式，最大 10MB</p>
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden>
                    <button class="btn-select" id="selectBtn">选择文件</button>
                </div>

                <!-- 压缩质量设置 -->
                <div class="quality-control">
                    <label for="qualitySlider">压缩质量</label>
                    <div class="quality-options">
                        <button class="quality-btn active" data-quality="80">高 (80%)</button>
                        <button class="quality-btn" data-quality="60">中 (60%)</button>
                        <button class="quality-btn" data-quality="40">低 (40%)</button>
                    </div>
                    <div class="custom-quality">
                        <input type="range" id="qualitySlider" min="10" max="100" value="80">
                        <span id="qualityValue">80%</span>
                    </div>
                </div>
            </section>

            <!-- 处理中的加载动画 -->
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="loading-spinner"></div>
                <p>正在压缩图片...</p>
            </div>

            <!-- 结果展示区域 -->
            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h2>压缩结果</h2>
                    <button class="btn-secondary" id="clearBtn">清空结果</button>
                </div>
                <div class="results-container" id="resultsContainer"></div>
                <div class="batch-actions">
                    <button class="btn-primary" id="downloadAllBtn">下载全部</button>
                </div>
            </section>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>所有图片处理均在您的浏览器和服务器之间安全传输，1小时后自动删除</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
